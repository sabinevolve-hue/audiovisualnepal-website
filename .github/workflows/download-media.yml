name: Download & Localize Motion Media

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/download-media.mjs'

jobs:
  download-media:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install sharp
        run: npm install sharp --no-save

      - name: Download and optimize media
        run: node scripts/download-media.mjs

      - name: Commit & push media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/textures public/videos
          git diff --staged --quiet && echo "Nothing to commit" || \
            { git stash --include-untracked && git pull --rebase origin main && git stash pop || true; git add -A public src/data 2>/dev/null; } && \
            git commit -m "chore: auto-download motion media [skip ci]" && git push
