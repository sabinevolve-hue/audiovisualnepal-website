name: Self-host Lampro LED hero photos
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/scrape-lampro-led-heroes.mjs'
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install sharp --no-save
      - run: node scripts/scrape-lampro-led-heroes.mjs
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/lampro-catalog src/data/lampro-catalog-media.json
          git diff --staged --quiet && echo "nothing" && exit 0
          git commit -m "chore: self-host real Lampro LED product photos"
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push origin main && exit 0; echo retry $i; sleep 10; done
          exit 1
