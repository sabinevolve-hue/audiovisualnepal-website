<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#06060A"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <radialGradient id="grad" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0071E3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#06060A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Grid pattern -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="white" stroke-width="0.5" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Brand dot -->
  <circle cx="80" cy="80" r="8" fill="#0071E3"/>
  <text x="100" y="88" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0071E3" letter-spacing="3">AUDIOVISUAL NEPAL</text>
  <!-- Main headline -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="white">Professional</text>
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="white">Audio Visual</text>
  <text x="80" y="460" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#0071E3">Solutions</text>
  <!-- Tagline -->
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="24" fill="#8A8A8E">Nepal's leading PA, conference &amp; AV systems provider</text>
  <!-- Right visual -->
  <circle cx="980" cy="315" r="180" fill="#0071E3" opacity="0.08"/>
  <circle cx="980" cy="315" r="130" fill="#0071E3" opacity="0.1"/>
  <circle cx="980" cy="315" r="80" fill="#0071E3" opacity="0.15"/>
  <!-- Sound wave lines -->
  <path d="M 900 315 Q 920 275 940 315 Q 960 355 980 315 Q 1000 275 1020 315 Q 1040 355 1060 315" stroke="#0071E3" stroke-width="3" fill="none" opacity="0.8"/>
</svg>
